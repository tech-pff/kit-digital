<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback y updates · PFF</title>
<style>
  :root{--azul:#13315c;--azul2:#1d4e89;--acento:#2a9d8f;--bg:#f5f7fa;--linea:#e3e8ef}
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg)}
  .sitenav{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:rgba(255,255,255,.96);backdrop-filter:blur(3px);border-bottom:1px solid var(--linea);padding:12px 24px}
  .sitenav a{color:var(--azul2);text-decoration:none;font-size:14px;font-weight:600}
  .sitenav a:hover{text-decoration:underline}
  .sitenav .sitenav-home{color:var(--azul);font-weight:700}
  .sitenav a.active{color:var(--acento)}
  .page-pad{padding:30px 20px 60px}
</style>
</head>
<body>
<nav class="sitenav">
  <a class="sitenav-home" href="../index.html">← Kit Digital</a>
  <a href="gqueues.html">GQueues</a>
  <a href="guia-claude-01-introduccion.html">Guía de Claude</a>
  <a class="active" href="feedback.html">Feedback</a>
</nav>
<div class="page-pad">
<!--
  TOOLBOX DIGITAL PFF — Formulario de feedback (pegar en un embed: Insertar -> Insertar codigo).
  Ya conectado al Google Form (las respuestas caen en la hoja "Feedback Toolbox PFF") y a la pagina de citas.
-->
<div class="fb-wrap">
  <style>
    .fb-wrap {
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
        sans-serif;
      max-width: 640px;
      margin: 0 auto;
      color: #1f2937;
    }
    .fb-card {
      background: #fff;
      border: 1px solid #e3e8ef;
      border-radius: 16px;
      padding: 24px;
      box-shadow:
        0 1px 3px rgba(16, 38, 73, 0.08),
        0 8px 22px rgba(16, 38, 73, 0.06);
    }
    .fb-card h3 {
      margin: 0 0 4px;
      color: #13315c;
      font-size: 19px;
    }
    .fb-sub {
      margin: 0 0 18px;
      font-size: 14px;
      color: #5b6470;
      line-height: 1.5;
    }
    .fb-field {
      margin-bottom: 14px;
    }
    .fb-field label {
      display: block;
      font-size: 13.5px;
      font-weight: 600;
      color: #13315c;
      margin-bottom: 5px;
    }
    .fb-field input,
    .fb-field select,
    .fb-field textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d6deea;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14.5px;
      font-family: inherit;
      color: #1f2937;
      background: #fff;
      transition:
        border-color 0.15s,
        box-shadow 0.15s;
    }
    .fb-field textarea {
      min-height: 96px;
      resize: vertical;
    }
    .fb-field input:focus,
    .fb-field select:focus,
    .fb-field textarea:focus {
      outline: none;
      border-color: #2a9d8f;
      box-shadow: 0 0 0 3px rgba(42, 157, 143, 0.15);
    }
    .fb-req {
      color: #c0392b;
    }
    .fb-btn {
      width: 100%;
      background: #1d4e89;
      color: #fff;
      border: none;
      border-radius: 11px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition:
        background 0.15s,
        transform 0.1s;
    }
    .fb-btn:hover {
      background: #163d6e;
    }
    .fb-btn:active {
      transform: scale(0.99);
    }
    .fb-ok {
      display: none;
      text-align: center;
      padding: 18px 12px;
    }
    .fb-ok .fb-check {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: #e1f5ee;
      color: #0f6e56;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 12px;
    }
    .fb-ok h3 {
      color: #0f6e56;
      margin: 0 0 4px;
    }
    .fb-ok p {
      color: #5b6470;
      font-size: 14px;
      margin: 0 0 14px;
    }
    .fb-again {
      background: none;
      border: none;
      color: #1d4e89;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    .fb-divider {
      display: flex;
      align-items: center;
      text-align: center;
      color: #8a93a5;
      font-size: 12.5px;
      margin: 18px 0 14px;
    }
    .fb-divider::before,
    .fb-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #e3e8ef;
    }
    .fb-divider span {
      padding: 0 12px;
    }
    .fb-cal {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      background: #fff;
      color: #1d4e89;
      border: 1px solid #1d4e89;
      border-radius: 11px;
      padding: 11px 16px;
      font-size: 14.5px;
      font-weight: 600;
      transition: background 0.15s;
    }
    .fb-cal:hover {
      background: #eef3fa;
    }
  </style>

  <div class="fb-card">
    <form
      id="fb-form"
      action="https://docs.google.com/forms/d/e/1FAIpQLSfbRTo2RFTRKvzch9fakprtx3mhezCdkEWT5l6sPvgbwLP6Dg/formResponse"
      method="POST"
      target="fb-sink"
    >
      <h3>Reportar feedback o sugerencia</h3>
      <p class="fb-sub">
        Reporta un problema, una sugerencia o una tarea que te gustaría
        automatizar.
      </p>

      <div class="fb-field">
        <label
          >Nombre
          <span style="color: #8a93a5; font-weight: 400"
            >(opcional)</span
          ></label
        >
        <input type="text" name="entry.132904455" placeholder="Tu nombre" />
      </div>

      <div class="fb-field">
        <label>Herramienta</label>
        <select name="entry.1404274184">
          <option>GQueues</option>
          <option>Claude</option>
          <option>Otra</option>
        </select>
      </div>

      <div class="fb-field">
        <label>Tipo</label>
        <select name="entry.133102140">
          <option>Problema / Issue</option>
          <option>Sugerencia</option>
          <option>Idea de skill</option>
          <option>Pregunta</option>
        </select>
      </div>

      <div class="fb-field">
        <label>Descripción <span class="fb-req">*</span></label>
        <textarea
          name="entry.1031627586"
          required
          placeholder="Describe el problema, la idea o la sugerencia con el mayor detalle posible."
        ></textarea>
      </div>

      <div class="fb-field">
        <label>Prioridad</label>
        <select name="entry.1089240634">
          <option>Baja</option>
          <option>Media</option>
          <option>Alta</option>
        </select>
      </div>

      <button type="submit" class="fb-btn">Enviar feedback</button>
    </form>

    <div class="fb-ok" id="fb-ok">
      <div class="fb-check">✓</div>
      <h3>¡Gracias!</h3>
      <button class="fb-again" id="fb-again">Enviar otro</button>
    </div>

    <div class="fb-divider"><span>¿prefieres comentarlo en persona?</span></div>
    <a
      class="fb-cal"
      href="https://calendar.app.google/oQJsgEEi5m5jWGMd9"
      target="_blank"
      rel="noopener"
      >📅 Agendar una cita con Ana</a
    >
  </div>

  <iframe
    name="fb-sink"
    id="fb-sink"
    style="display: none"
    aria-hidden="true"
  ></iframe>
  <script>
    (function () {
      var form = document.getElementById("fb-form");
      var ok = document.getElementById("fb-ok");
      var again = document.getElementById("fb-again");
      var sink = document.getElementById("fb-sink");
      var submitted = false;
      form.addEventListener("submit", function () {
        submitted = true;
      });
      sink.addEventListener("load", function () {
        if (!submitted) return;
        submitted = false;
        form.style.display = "none";
        ok.style.display = "block";
        form.reset();
      });
      again.addEventListener("click", function () {
        ok.style.display = "none";
        form.style.display = "block";
      });
    })();
  </script>
</div>
</div>
</body>
</html>
